apiVersion: apps/v1
kind: Deployment
metadata:
  name: bit707-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bit707-app
  template:
    metadata:
      labels:
        app: bit707-app
    spec:
      containers:
      - name: bit707-app
        image: bit707devopscapstone.azurecr.io/bit707-app:v1
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"